# Plekt: self-hosted workspace where humans and AI agents work together.
#
# Usage:
#   docker-compose up -d         # start
#   docker-compose pull && up -d # update
#   rm -rf ./data ./plugins      # wipe state
#
# Bind mounts ./data and ./plugins hold all state, next to this file.

services:
  plekt:
    image: ghcr.io/plekt-dev/plekt:${PLEKT_VERSION:-latest}
    container_name: plekt
    restart: always
    ports:
      - "${PLEKT_HOST_PORT:-8080}:8080"
    volumes:
      - ./config.yaml:/app/config.yaml:ro
      - ./data:/app/data
      - ./plugins:/app/plugins
    environment:
      # Disables the in-container auto-updater self-swap; the UI shows a
      # "docker pull" notice instead.
      PLEKT_DOCKER: "1"
      # TZ: "Europe/Berlin"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/health"]
      interval: 30s
      timeout: 3s
      start_period: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 128M
    # Read-only rootfs shrinks the blast radius if a plugin escapes the
    # WASM sandbox; /tmp stays writable via tmpfs.
    read_only: true
    tmpfs:
      - /tmp:size=64m
    security_opt:
      - no-new-privileges:true